compose:
  name: Compose image
  description: Compose a base image with overlay layers and return a /local/ URL.
  fields:
    base_image:
      name: Base image
      description: Base image URL or /local/ path.
      required: true
      example: /local/cars/base.png
      selector:
        text:
    layers:
      name: Layers
      description: List of overlay layers (image, x, y, opacity, scale).
      required: false
      example:
        - image: /local/cars/door_open.png
          x: 0
          y: 0
          opacity: 1.0
          scale: 1.0
      selector:
        object:
    output_name:
      name: Output filename
      description: Optional filename for the output image.
      required: false
      example: car_state.png
      selector:
        text:
    cache_key:
      name: Cache key
      description: If provided and file exists, return cached file.
      required: false
      example: car_state_hash
      selector:
        text:
    format:
      name: Format
      description: Output format (png or jpg).
      required: false
      example: png
      selector:
        text:
    output_path:
      name: Output path
      description: Target path relative to /config (default www/image_compositor).
      required: false
      example: www/image_compositor
      selector:
        text:

file_exists:
  name: File exists
  description: Checks whether a local file exists in /config/www.
  fields:
    local_url:
      name: Local URL
      description: /local/ URL to check.
      required: false
      example: /local/image_compositor/example.png
      selector:
        text:
    path:
      name: Path
      description: Target path relative to /config (default www/image_compositor).
      required: false
      example: www/image_compositor
      selector:
        text:
    filename:
      name: Filename
      description: Filename to check in the given path.
      required: false
      example: example.png
      selector:
        text:

clear_cache:
  name: Clear cache
  description: Deletes cached files in /config/www/image_compositor.
  fields:
    prefix:
      name: Prefix
      description: Optional filename prefix to delete.
      required: false
      example: car_state_
      selector:
        text:

ensure_assets:
  name: Ensure assets
  description: Generate and cache assets via ai_task, OpenAI, or Google Gemini (edits or generations). Masks are optional.
  fields:
    output_path:
      name: Output path
      description: Target path relative to /config (default www/image_compositor/assets).
      required: false
      example: www/image_compositor/assets
      selector:
        text:
    task_name_prefix:
      name: Task name prefix
      description: Prefix for ai_task task names.
      required: false
      example: BMW Assets
      selector:
        text:
    force:
      name: Force regeneration
      description: Regenerate assets even if target files already exist.
      required: false
      example: true
      selector:
        boolean:
    provider:
      name: Provider
      description: Provider config (type=ai_task|openai|gemini, entity_id, api_key, model, size, service_data).
      required: false
      selector:
        object:
    assets:
      name: Assets
      description: List of assets to generate (name, prompt, filename, mask_url, base_ref, base_image, derive_overlay, attempts, postprocess=icon_overlay, icon_max_size).
      required: true
      selector:
        object:

generate_masks:
  name: Generate masks
  description: Auto-generate binary mask images from a base image by AI-editing each target and diffing against the base.
  fields:
    output_path:
      name: Output path
      description: Target path relative to /config (default www/image_compositor/masks).
      required: false
      example: www/image_compositor/masks
      selector:
        text:
    asset_path:
      name: Asset path
      description: Path for base auto-detection (default www/image_compositor/assets).
      required: false
      example: www/image_compositor/assets
      selector:
        text:
    base_image:
      name: Base image
      description: Optional base image URL or /local/... (if omitted, latest *_base.png in asset_path is used).
      required: false
      example: /local/image_compositor/assets/bmw_base.png
      selector:
        text:
    provider:
      name: Provider
      description: Provider config (type=openai|gemini, api_key, model, size, service_data). For gemini masks, low temperature defaults are applied unless overridden in service_data.generationConfig.
      required: true
      selector:
        object:
    base_view:
      name: Base view
      description: Optional view hint used in default prompts.
      required: false
      example: front 3/4 view
      selector:
        text:
    base_prompt:
      name: Base prompt
      description: Optional prompt prefix used for target mask prompts.
      required: false
      selector:
        text:
    threshold:
      name: Diff threshold
      description: Difference threshold for binary mask generation (default 16). Higher values suppress small pixel noise.
      required: false
      example: 16
      selector:
        number:
          min: 1
          max: 255
          mode: box
    targets:
      name: Targets
      description: Optional list of mask targets (name, description, prompt, filename).
      required: false
      selector:
        object:
